<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dabur Canteen App</title>

<style>

body{
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
    text-align:center;
    padding-top:60px;
}

.card{
    background:white;
    width:320px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
    width:100px;
    height:100px;
    border-radius:20px;
}

.appname{
    font-size:22px;
    font-weight:600;
    margin-top:15px;
}

.version{
    color:gray;
    margin-bottom:25px;
}

.install{
    background:#007AFF;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

.install:hover{
    background:#005ecb;
}

.footer{
    margin-top:40px;
    color:gray;
    font-size:12px;
}

</style>

<script>

function installApp(){

    var pass = prompt("Enter Employee Password");

    if(pass === "dabur123"){

        window.location.href =
        "itms-services://?action=download-manifest&url=https://office-net.github.io/dabur-app/manifest.plist";

    }else{

        alert("Wrong Password");

    }

}

</script>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="appname">Dabur Canteen</div>

<div class="version">Version 1.0</div>

<button class="install" onclick="installApp()">Install App</button>

</div>

<div class="footer">
Internal Employee Application
</div>

</body>
</html>
